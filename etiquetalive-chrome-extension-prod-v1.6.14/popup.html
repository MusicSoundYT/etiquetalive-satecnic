<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:260px;padding:14px;font-family:sans-serif;background:#1a1a2e;color:#e0dcd5}
h1{font-size:15px;color:#f3dfad;margin-bottom:10px}
input{width:100%;padding:8px;border:1px solid rgba(216,183,107,.3);border-radius:8px;font-size:13px;background:#16213e;color:#fff;margin-bottom:8px;outline:none}
input:focus{border-color:#d8b76b}
button{width:100%;padding:8px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none}
button:disabled{opacity:.5}
.gold{background:#d8b76b;color:#1a1a2e}
.danger{background:#ef5350;color:#fff}
.row{display:flex;gap:6px;margin-top:8px}.row button{flex:1;padding:6px}
#msg{padding:8px;border-radius:8px;margin-bottom:8px;text-align:center;font-size:12px;display:none}
#msg.ok{background:rgba(67,208,138,.15);color:#43d08a;display:block}
#msg.err{background:rgba(229,57,53,.15);color:#ef5350;display:block}
a{display:block;text-align:center;margin-top:10px;color:#d8b76b;font-size:11px;text-decoration:none}
</style>
</head>
<body>
<h1>◆ EtiquetaLive</h1>
<div id="msg"></div>
<input type="password" id="key" placeholder="API key" autocomplete="off">
<button class="gold" id="btn">Conectar</button>
<div class="row" id="sessionRow" style="display:none">
  <button class="gold" id="startBtn">Live</button>
  <button class="danger" id="stopBtn">Parar</button>
</div>
<a href="https://etiquetalivetiktok.satecnic.es/" target="_blank">Dashboard ↗</a>
<script src="popup.js"></script>
</body>
</html>
